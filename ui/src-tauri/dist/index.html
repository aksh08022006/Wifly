<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetShaper - Device Management</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: #e2e8f0;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      background: rgba(30, 41, 59, 0.8);
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      border-left: 4px solid #3b82f6;
    }
    .header h1 { font-size: 28px; margin-bottom: 5px; }
    .header p { color: #94a3b8; font-size: 14px; }
    
    .controls {
      display: flex;
      gap: 10px;
      margin: 20px 0;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    .btn-primary:hover { background: #2563eb; }
    .btn-success {
      background: #10b981;
      color: white;
      font-size: 12px;
      padding: 6px 12px;
    }
    .btn-success:hover { background: #059669; }
    .btn-danger {
      background: #ef4444;
      color: white;
      font-size: 12px;
      padding: 6px 12px;
    }
    .btn-danger:hover { background: #dc2626; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .devices-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }
    
    .device-card {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .device-card:hover {
      background: rgba(30, 41, 59, 0.9);
      border-color: #3b82f6;
      transform: translateY(-2px);
    }
    .device-card.approved { border-left: 4px solid #10b981; }
    .device-card.pending { border-left: 4px solid #f59e0b; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .device-icon { font-size: 24px; }
    .device-name {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    .device-ip {
      font-size: 12px;
      color: #94a3b8;
      margin: 2px 0 0 0;
    }
    .status-badge {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 500;
    }
    .status-badge.approved {
      background: rgba(16, 185, 129, 0.2);
      color: #10b981;
    }
    .status-badge.pending {
      background: rgba(245, 158, 11, 0.2);
      color: #f59e0b;
    }

    .bandwidth-info {
      margin: 12px 0;
      font-size: 13px;
    }
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #1e293b;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 6px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      transition: width 0.3s;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #334155;
    }
    .card-actions button {
      flex: 1;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
      font-size: 16px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #e2e8f0;
      margin: 20px 0 10px 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      flex: 1;
    }
    .stat-number {
      font-size: 32px;
      font-weight: bold;
      color: #3b82f6;
    }
    .stat-label {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 8px;
      text-transform: uppercase;
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #10b981;
      color: white;
      padding: 12px 20px;
      border-radius: 6px;
      display: none;
      z-index: 1000;
    }
    .notification.show { display: block; animation: slideIn 0.3s; }
    .notification.error { background: #ef4444; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🌐 NetShaper</h1>
      <p>Network Device Management & Bandwidth Control</p>
    </div>

    <div class="controls">
      <button class="btn btn-primary" onclick="alert('Button works!'); loadDevices()">🔄 Refresh Devices</button>
      <button class="btn btn-primary" onclick="alert('Toggling mock'); toggleMockData()">📊 Toggle Mock Data</button>
    </div>

    <div class="stats" id="stats"></div>

    <h2 class="section-title">Approved Devices</h2>
    <div class="devices-grid" id="approved-devices"></div>

    <h2 class="section-title">Pending Devices</h2>
    <div class="devices-grid" id="pending-devices"></div>

    <div id="notification" class="notification"></div>
  </div>

  <script>
    let useMockData = true; // Default to mock data since Tauri API isn't loading

    const mockDevices = [];

    async function invoke(cmd, args = {}) {
      // Direct Tauri v2 invoke
      if (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke) {
        console.log(`Tauri v2 invoke: ${cmd}`, args);
        return window.__TAURI__.core.invoke(cmd, args);
      }
      
      // Tauri v1 fallback
      if (window.__TAURI__ && window.__TAURI__.invoke) {
        console.log(`Tauri v1 invoke: ${cmd}`, args);
        return window.__TAURI__.invoke(cmd, args);
      }
      
      // No Tauri API found
      const msg = 'Tauri API not available at all';
      console.error(msg);
      throw new Error(msg);
    }

    async function loadDevices() {
      try {
        let devices = [];
        
        if (useMockData) {
          // Using mock data mode - don't try to invoke Tauri
          devices = mockDevices;
          renderDevices(devices);
          showNotification('📊 Using Mock Data Mode (Tauri disabled)', false);
        } else {
          // Try to invoke Tauri
          try {
            const response = await invoke('list_devices');
            devices = response || [];
            renderDevices(devices);
            showNotification('✓ Devices loaded from daemon', false);
          } catch (invokeErr) {
            console.error('invoke failed:', invokeErr);
            showNotification(`✗ Daemon error: ${invokeErr.message}`, true);
            renderDevices([]);
          }
        }
      } catch (err) {
        console.error('loadDevices error:', err);
        renderDevices([]);
        showNotification(`✗ Error: ${err}`, true);
      }
    }

    function renderDevices(devices) {
      const approved = devices.filter(d => d.approved);
      const pending = devices.filter(d => !d.approved);

      // Update stats
      document.getElementById('stats').innerHTML = `
        <div class="stat-box">
          <div class="stat-number">${approved.length}</div>
          <div class="stat-label">Approved</div>
        </div>
        <div class="stat-box">
          <div class="stat-number">${pending.length}</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-box">
          <div class="stat-number">${devices.length}</div>
          <div class="stat-label">Total</div>
        </div>
      `;

      // Render approved devices
      document.getElementById('approved-devices').innerHTML = devices
        .filter(d => d.approved)
        .map(d => renderDeviceCard(d))
        .join('') || '<div class="empty-state">No approved devices yet</div>';

      // Render pending devices
      document.getElementById('pending-devices').innerHTML = devices
        .filter(d => !d.approved)
        .map(d => renderDeviceCard(d))
        .join('') || '<div class="empty-state">No pending devices</div>';
    }

    function renderDeviceCard(device) {
      const bandwidthMB = (device.bandwidth_limit / 1_000_000).toFixed(1);
      const usageMB = (device.current_usage / 1_000_000).toFixed(1);
      const usagePercent = device.bandwidth_limit > 0 
        ? ((device.current_usage / device.bandwidth_limit) * 100).toFixed(0)
        : 0;
      
      const enrolledDate = new Date(device.enrolled_at).toLocaleDateString();

      return `
        <div class="device-card ${device.approved ? 'approved' : 'pending'}">
          <div class="card-header">
            <div>
              <div style="font-size: 24px; margin-bottom: 4px;">📱</div>
            </div>
            <div style="flex: 1;">
              <div class="device-name">${device.hostname || device.ip}</div>
              <div class="device-ip">${device.ip}</div>
            </div>
            <div class="status-badge ${device.approved ? 'approved' : 'pending'}">
              ${device.approved ? '✓ Approved' : '⏳ Pending'}
            </div>
          </div>

          <div class="bandwidth-info">
            <div>Bandwidth: ${usageMB} MB/s / ${bandwidthMB} MB/s</div>
            <div style="color: #64748b; font-size: 11px; margin-top: 4px;">Usage: ${usagePercent}%</div>
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${usagePercent}%"></div>
            </div>
          </div>

          <small style="color: #64748b;">Enrolled: ${enrolledDate}</small>

          ${!device.approved ? `
            <div class="card-actions">
              <button class="btn btn-success" onclick="approveDevice('${device.ip}')">✓ Approve</button>
              <button class="btn btn-danger" onclick="denyDevice('${device.ip}')">✕ Deny</button>
            </div>
          ` : ''}
        </div>
      `;
    }

    async function approveDevice(ip) {
      try {
        await invoke('approve_device', { ip });
        showNotification(`✓ Device ${ip} approved`, false);
        await loadDevices();
      } catch (err) {
        showNotification(`✗ Error approving device: ${err}`, true);
      }
    }

    async function denyDevice(ip) {
      try {
        await invoke('deny_device', { ip });
        showNotification(`✓ Device ${ip} denied`, false);
        await loadDevices();
      } catch (err) {
        showNotification(`✗ Error denying device: ${err}`, true);
      }
    }

    function showNotification(message, isError = false) {
      const notif = document.getElementById('notification');
      notif.textContent = message;
      notif.className = 'notification show' + (isError ? ' error' : '');
      setTimeout(() => notif.classList.remove('show'), 3000);
    }

    function toggleMockData() {
      useMockData = !useMockData;
      showNotification(useMockData ? '📊 Using Mock Data' : '🔗 Using Real Data', false);
      loadDevices();
    }

    // Load devices on page load
    window.addEventListener('load', () => {
      console.log('Page loaded');
      console.log('window.__TAURI__:', typeof window.__TAURI__);
      
      // Check if Tauri API exists
      if (window.__TAURI__ && (window.__TAURI__.invoke || (window.__TAURI__.core && window.__TAURI__.core.invoke))) {
        console.log('✓ Tauri API detected - real mode');
        useMockData = false;
        showNotification('✓ Tauri API found - connected', false);
      } else {
        console.log('✗ Tauri API not detected - using mock mode');
        useMockData = true;
        showNotification('⚠️ Tauri API not found - using Mock Data only', true);
      }
      
      renderDevices([]);
    });

    // Manual refresh only (user clicks button)
  </script>
</body>
</html>
