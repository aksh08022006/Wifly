name: Build WFP Callout

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-wfp:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build wfp-callout
        run: cargo build -p wfp-callout --target x86_64-pc-windows-msvc --release

      - name: Build daemon
        run: cargo build -p daemon --target x86_64-pc-windows-msvc --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netshaper-windows-build
          path: |
            target/x86_64-pc-windows-msvc/release/wfp_callout.dll
            target/x86_64-pc-windows-msvc/release/daemon.exe
