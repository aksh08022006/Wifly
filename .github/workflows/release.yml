name: Build & Release NetShaper

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v1.0.0, v1.0.1, etc)

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          npm install -g pnpm
      
      - name: Build daemon
        run: cargo build -p daemon --release
      
      - name: Build UI
        run: |
          cd ui
          pnpm install
          pnpm run tauri build
      
      - name: Install WiX
        run: |
          dotnet tool install --global wix
          wix extension add WixToolset.UI.wix
      
      - name: Create WiX XML
        run: |
          $version = "${{ github.ref }}".replace('refs/tags/v', '')
          Write-Host "Building version: $version"
          
          $wxs = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
              <Product 
                  Id="*" 
                  Name="NetShaper" 
                  Language="1033" 
                  Version="$version" 
                  UpgradeCode="12345678-1234-1234-1234-123456789012"
                  Manufacturer="NetShaper Team">
                  
                  <Package 
                      InstallerVersion="200" 
                      Compressed="yes" 
                      Platform="x64" 
                      Description="NetShaper - Real-time Bandwidth Manager" />
                  
                  <Media Id="1" Cabinet="NetShaper.cab" EmbedCab="yes" />
                  
                  <Directory Id="TARGETDIR" Name="SourceDir">
                      <Directory Id="ProgramFilesFolder">
                          <Directory Id="INSTALLFOLDER" Name="NetShaper" />
                      </Directory>
                      <Directory Id="ProgramMenuFolder">
                          <Directory Id="ApplicationProgramsFolder" Name="NetShaper" />
                      </Directory>
                      <Directory Id="DesktopFolder" Name="Desktop" />
                  </Directory>
                  
                  <Feature Id="ProductFeature" Title="NetShaper" Level="1">
                      <ComponentRef Id="DaemonExe" />
                      <ComponentRef Id="UIExe" />
                      <ComponentRef Id="DesktopShortcut" />
                  </Feature>
              </Product>
              
              <Fragment>
                  <DirectoryRef Id="INSTALLFOLDER">
                      <Component Id="DaemonExe" Guid="*">
                          <File Id="daemon_exe" Source="target/release/daemon.exe" />
                      </Component>
                      <Component Id="UIExe" Guid="*">
                          <File Id="ui_exe" Source="ui/target/release/bundle/msi/NetShaper_*.msi" />
                      </Component>
                  </DirectoryRef>
                  
                  <DirectoryRef Id="ApplicationProgramsFolder">
                      <Component Id="ApplicationShortcut" Guid="*">
                          <Shortcut 
                              Id="ApplicationStartMenuShortcut" 
                              Name="NetShaper"
                              Description="Real-time Bandwidth Manager"
                              Target="[INSTALLFOLDER]netshaper-ui.exe"
                              WorkingDirectory="INSTALLFOLDER" />
                          <RegistryValue 
                              Root="HKCU" 
                              Key="Software\NetShaper" 
                              Name="installed" 
                              Type="integer" 
                              Value="1" 
                              KeyPath="yes" />
                      </Component>
                  </DirectoryRef>
                  
                  <DirectoryRef Id="DesktopFolder">
                      <Component Id="DesktopShortcut" Guid="*">
                          <Shortcut 
                              Id="DesktopShortcut" 
                              Name="NetShaper"
                              Description="Real-time Bandwidth Manager"
                              Target="[INSTALLFOLDER]netshaper-ui.exe"
                              WorkingDirectory="INSTALLFOLDER" />
                          <RegistryValue 
                              Root="HKCU" 
                              Key="Software\NetShaper\Desktop" 
                              Name="shortcut" 
                              Type="integer" 
                              Value="1" 
                              KeyPath="yes" />
                      </Component>
                  </DirectoryRef>
              </Fragment>
          </Wix>
          "@
          
          $wxs | Out-File -FilePath "netshaper.wxs" -Encoding UTF8
      
      - name: Build MSI
        run: |
          wix build netshaper.wxs -o NetShaper.msi
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            NetShaper.msi
            target/release/daemon.exe
            ui/target/release/netshaper-ui.exe
          draft: false
          prerelease: false
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Build
        run: |
          cd ui
          npm install
          npm run tauri build
      
      - name: Upload macOS app
        uses: softprops/action-gh-release@v1
        with:
          files: ui/target/release/bundle/macos/NetShaper.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      
      - name: Build
        run: |
          cd ui
          npm install
          npm run tauri build
      
      - name: Upload Linux AppImage
        uses: softprops/action-gh-release@v1
        with:
          files: ui/target/release/bundle/appimage/NetShaper*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
