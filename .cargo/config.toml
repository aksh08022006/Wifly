# Cross-compilation configuration for Windows target
# ================================================================
# When building on Windows natively: use default MSVC linker (link.exe)
# When cross-compiling from macOS: uncomment lld-link config below

# [target.x86_64-pc-windows-msvc]
# Use lld-link as the linker (from LLVM) - for macOS cross-compile only
# linker = "lld-link"

# Windows SDK paths for macOS cross-compilation
# NOTE: You must run: xwin --accept-license splat --output ~/.xwin
# rustflags = [
#  "-C", "link-arg=/LIBPATH:$HOME/.xwin/crt/lib/x86_64",
#   "-C", "link-arg=/LIBPATH:$HOME/.xwin/sdk/lib/um/x86_64",
#   "-C", "link-arg=/LIBPATH:$HOME/.xwin/sdk/lib/ucrt/x86_64",
# ]
